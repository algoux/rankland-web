x-rankland-image: &rankland-image ${RANKLAND_IMAGE:-algoux/rankland-web:latest}

x-database-environment: &database-environment
  # MYSQL_HOST must be a service name or address reachable from containers;
  # 127.0.0.1 points to the current container in the default bridge network.
  MYSQL_HOST: ${MYSQL_HOST:?MYSQL_HOST is required}
  MYSQL_PORT: ${MYSQL_PORT:-3306}
  MYSQL_DB: ${MYSQL_DB:?MYSQL_DB is required}
  MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
  MYSQL_PASS: ${MYSQL_PASS:?MYSQL_PASS is required}
  # Controls Node's local-time input interpretation and API presentation only.
  # MySQL DATETIME/TIMESTAMP storage sessions are always initialized to UTC.
  TZ: ${TZ:-Asia/Shanghai}

x-app-service: &app-service
  image: *rankland-image
  restart: unless-stopped
  depends_on:
    migrate:
      condition: service_completed_successfully
  environment:
    <<: *database-environment
    SERVER_HOST: 0.0.0.0
    SERVER_PORT: 3000
    # The same bridge-network rule applies here when Redis runs externally.
    REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
    REDIS_PORT: ${REDIS_PORT:-6379}
    REDIS_DB: ${REDIS_DB:-0}
    REDIS_PASS: ${REDIS_PASS:-}
    AUTH_TOKEN: ${AUTH_TOKEN:?AUTH_TOKEN is required}
    FILE_PROVIDER: ${FILE_PROVIDER:-FS}
    FILE_BASE_URL: ${FILE_BASE_URL:-}
    FS_BASE_PATH: ${FS_BASE_PATH:-/app/temp/file/}
    COS_SECRET_ID: ${COS_SECRET_ID:-}
    COS_SECRET_KEY: ${COS_SECRET_KEY:-}
    COS_DOMAIN: ${COS_DOMAIN:-}
    COS_BUCKET: ${COS_BUCKET:-}
    COS_REGION: ${COS_REGION:-}
    COS_BASE_PATH: ${COS_BASE_PATH:-rankland/file/}
  volumes:
    - rankland-files:${FS_BASE_PATH:-/app/temp/file/}
  healthcheck:
    test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/checkHealth']
    interval: 3s
    timeout: 5s
    retries: 3

services:
  migrate:
    image: *rankland-image
    restart: 'no'
    command: ['npm', 'run', 'db:migration:run:prod']
    environment: *database-environment

  # Copy this block as app-2/app-3 when running more processes.
  # Keep the app-service anchor and give every copy a unique
  # service name, container_name, and host port.
  app:
    <<: *app-service
    container_name: rankland-web
    ports:
      - 3000:3000

volumes:
  rankland-files:
