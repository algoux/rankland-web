name: Test

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.9'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: rankland
          MYSQL_USER: blue
          MYSQL_PASSWORD: test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: '3306'
      MYSQL_DB: rankland
      MYSQL_USER: blue
      MYSQL_PASS: test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      REDIS_NAMESPACE: rankland-ci-${{ github.run_id }}-${{ github.run_attempt }}
      RUN_MYSQL_TESTS: 'true'
      RUN_REDIS_TESTS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            package.json
            pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm run db:migration:run

      - name: Run tests
        run: pnpm test

      - name: Build app for multi-process smoke
        run: pnpm run build

      - name: Run contest notification multi-process smoke
        env:
          RUN_NOTIFICATION_SMOKE: 'true'
          AUTH_TOKEN: rankland-notification-smoke
          FILE_PROVIDER: FS
          FS_BASE_PATH: ${{ runner.temp }}/rankland-notification-smoke-files
        run: pnpm run test:notification-smoke
