name: Build Docker Image

on:
  workflow_run:
    workflows:
      - Test
    types:
      - completed
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.9'

jobs:
  build-and-push:
    if: >-
      ${{
        github.repository == 'algoux/rankland-web' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-latest
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            package.json
            pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          CDN_BASE: ${{ vars.CDN_BASE }}
          LEGACY_API_BASE_CLIENT: ${{ vars.LEGACY_API_BASE_CLIENT }}
          SRK_STORAGE_BASE: ${{ vars.SRK_STORAGE_BASE }}
          VIN_URL: ${{ vars.VIN_URL }}
          HOST_GLOBAL: ${{ vars.HOST_GLOBAL }}
          HOST_CN: ${{ vars.HOST_CN }}
          SITE_ALIAS: ${{ vars.SITE_ALIAS }}
          BEIAN: ${{ vars.BEIAN }}
          LIVE_POLLING_INTERVAL: ${{ vars.LIVE_POLLING_INTERVAL }}
          WS_BASE: ${{ vars.WS_BASE }}
          GTAG: ${{ vars.GTAG }}
          BUILD_COMMIT: ${{ github.event.workflow_run.head_sha }}
        run: pnpm run build

      - name: Upload frontend assets to CDN
        env:
          COS_BASE_PATH: ${{ vars.COS_BASE_PATH }}
        run: node scripts/upload-cos.cjs

      - name: Prune development dependencies
        run: pnpm prune --prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v3
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rankland-web:latest

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"
          : "${VPS_KNOWN_HOSTS:?VPS_KNOWN_HOSTS secret is required}"

          VPS_PORT="${VPS_PORT:-22}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/rankland-web-deploy
          chmod 600 ~/.ssh/rankland-web-deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh -i ~/.ssh/rankland-web-deploy \
            -p "$VPS_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            'cd /opt/rankland-web && bash ./up.sh'
