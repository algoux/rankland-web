name: Build Docker Image

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.9'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_DOMAIN: ${{ secrets.COS_DOMAIN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            package.json
            pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build app
        env:
          CDN_BASE: ${{ vars.CDN_BASE }}
          API_BASE_CLIENT: ${{ vars.API_BASE_CLIENT }}
          CDN_API_BASE_CLIENT: ${{ vars.CDN_API_BASE_CLIENT }}
          SRK_STORAGE_BASE: ${{ vars.SRK_STORAGE_BASE }}
          HOST_GLOBAL: ${{ vars.HOST_GLOBAL }}
          HOST_CN: ${{ vars.HOST_CN }}
          SITE_ALIAS: ${{ vars.SITE_ALIAS }}
          BEIAN: ${{ vars.BEIAN }}
          LIVE_POLLING_INTERVAL: ${{ vars.LIVE_POLLING_INTERVAL }}
          WS_BASE: ${{ vars.WS_BASE }}
          GTAG: ${{ vars.GTAG }}
        run: pnpm run build

      - name: Upload frontend assets to CDN
        env:
          COS_BASE_PATH: ${{ vars.COS_BASE_PATH }}
        run: node scripts/upload-cos.cjs

      - name: Prune development dependencies
        run: pnpm prune --prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v3
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rankland-web:latest
