<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=0.5,maximum-scale=1.0,user-scalable=yes" />

    <meta name="keywords" content="RankLand,programming,algorithm,ranklist,standings,编程,算法,竞赛,程序设计,ICPC,CCPC,榜单,排名" />
    <meta name="color-scheme" content="dark light" />
    <meta name="darkreader-lock" />
    <meta property="og:site_name" content="RankLand" />

    <title>RankLand</title>
    <script data-rankland-theme-bootstrap>
      var systemThemeMediaQuery = window.matchMedia
        ? window.matchMedia('(prefers-color-scheme: dark)')
        : { matches: false };
      document.documentElement.className = systemThemeMediaQuery.matches ? 'dark' : 'light';
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/client/entry-client.ts"></script>
  </body>
