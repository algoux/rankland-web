<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=0.5,maximum-scale=1.0,user-scalable=yes" />
    <meta name="description" content="专业的算法竞赛榜单平台，收录 ICPC、CCPC 等各类赛事的榜单。" />
    <meta name="keywords" content="RankLand,programming,algorithm,ranklist,standings,编程,算法,竞赛,程序设计,ICPC,CCPC,榜单,排名" />
    <meta name="color-scheme" content="dark light" />
    <meta name="darkreader-lock" />
    <meta property="og:site_name" content="RankLand" />
    <meta property="og:description" content="RankLand: 专业算竞榜单平台" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>RankLand</title>
    <style>body{margin:0;background-color:#f0f2f5;opacity:0;transition:opacity 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);}@media(prefers-color-scheme:dark){body{background-color:#000;}}</style>
    <script>
      (function () {
        var themeMode = 'auto';
        try {
          var storedThemeMode = window.localStorage && window.localStorage.getItem('RanklandThemeMode');
          if (storedThemeMode === 'auto' || storedThemeMode === 'light' || storedThemeMode === 'dark') {
            themeMode = storedThemeMode;
          }
        } catch (e) {}
        var systemThemeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        var themeName = themeMode === 'light' || themeMode === 'dark'
          ? themeMode
          : (systemThemeMediaQuery.matches ? 'dark' : 'light');
        document.documentElement.className = themeName;
        document.documentElement.style.colorScheme = themeName;
      })();
    </script>
  </head>
  <body>
    <!--[if IE]>
      <p>You are using an <strong>outdated</strong> browser. Please <a href="http://browsehappy.com/" target="_blank" rel="noreferrer noopener">upgrade your browser</a> to improve your experience.</p>
    <![endif]-->
    <script>
      const __darkReaderInjected = document.head.querySelector('.darkreader');
      __darkReaderInjected && __darkReaderInjected.remove();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/client/entry-client.ts"></script>
  </body>
</html>
